<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark variant: deeper purple background, slightly dimmed bubble -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="#2D1B69"/>
  <!-- Speech bubble body -->
  <ellipse cx="256" cy="220" rx="160" ry="130" fill="#E8E0F5"/>
  <!-- Speech bubble tail -->
  <polygon points="180,320 220,340 150,400" fill="#E8E0F5"/>
  <!-- Left eye -->
  <circle cx="210" cy="200" r="22" fill="#2D1B69"/>
  <circle cx="216" cy="194" r="7" fill="#E8E0F5"/>
  <!-- Right eye -->
  <circle cx="302" cy="200" r="22" fill="#2D1B69"/>
  <circle cx="308" cy="194" r="7" fill="#E8E0F5"/>
  <!-- Smile -->
  <path d="M 220 245 Q 256 285 292 245" stroke="#2D1B69" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>