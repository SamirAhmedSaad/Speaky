<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bg1)"/>
  <!-- Speech bubble body -->
  <ellipse cx="256" cy="220" rx="160" ry="130" fill="white"/>
  <!-- Speech bubble tail -->
  <polygon points="180,320 220,340 150,400" fill="white"/>
  <!-- Left eye -->
  <circle cx="210" cy="200" r="22" fill="#4F46E5"/>
  <circle cx="216" cy="194" r="7" fill="white"/>
  <!-- Right eye -->
  <circle cx="302" cy="200" r="22" fill="#4F46E5"/>
  <circle cx="308" cy="194" r="7" fill="white"/>
  <!-- Smile -->
  <path d="M 220 245 Q 256 285 292 245" stroke="#4F46E5" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>