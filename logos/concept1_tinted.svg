<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Tinted variant: monochrome style -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="#1C1C1E"/>
  <!-- Speech bubble body -->
  <ellipse cx="256" cy="220" rx="160" ry="130" fill="#8E8E93"/>
  <!-- Speech bubble tail -->
  <polygon points="180,320 220,340 150,400" fill="#8E8E93"/>
  <!-- Left eye -->
  <circle cx="210" cy="200" r="22" fill="#1C1C1E"/>
  <circle cx="216" cy="194" r="7" fill="#8E8E93"/>
  <!-- Right eye -->
  <circle cx="302" cy="200" r="22" fill="#1C1C1E"/>
  <circle cx="308" cy="194" r="7" fill="#8E8E93"/>
  <!-- Smile -->
  <path d="M 220 245 Q 256 285 292 245" stroke="#1C1C1E" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>