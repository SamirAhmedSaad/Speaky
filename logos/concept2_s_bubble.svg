<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bg2)"/>
  <!-- Speech bubble shape -->
  <rect x="96" y="80" width="320" height="280" rx="60" ry="60" fill="white"/>
  <!-- Bubble tail -->
  <polygon points="160,340 200,360 130,420" fill="white"/>
  <!-- Letter S -->
  <text x="256" y="300" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="240" fill="#F97316" text-anchor="middle" dominant-baseline="middle">S</text>
</svg>