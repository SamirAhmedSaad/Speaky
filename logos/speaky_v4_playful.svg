<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Warm coral background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#FF6B6B"/>
  <!-- Big white S as background element -->
  <text x="160" y="380" font-family="Arial Black, sans-serif" font-weight="900" font-size="400" fill="white" opacity="0.1">S</text>
  <!-- Chat bubble -->
  <path d="M100,180 Q100,140 140,140 L372,140 Q412,140 412,180 L412,290 Q412,330 372,330 L220,330 L160,395 L175,330 L140,330 Q100,330 100,290 Z" fill="white"/>
  <!-- Speaky text -->
  <text x="256" y="255" font-family="Arial Black, sans-serif" font-weight="900" font-size="64" fill="#FF6B6B" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">Speaky</text>
  <!-- Three dots typing indicator below text -->
  <circle cx="215" cy="300" r="7" fill="#FF6B6B" opacity="0.3"/>
  <circle cx="250" cy="300" r="7" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="285" cy="300" r="7" fill="#FF6B6B" opacity="0.8"/>
</svg>