<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bg5)"/>
  <!-- Main speech bubble -->
  <rect x="80" y="100" width="352" height="230" rx="50" ry="50" fill="white"/>
  <!-- Bubble tail -->
  <polygon points="170,310 210,330 140,390" fill="white"/>
  <!-- Speaky text -->
  <text x="256" y="240" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="72" fill="#7C3AED" text-anchor="middle" dominant-baseline="middle">Speaky</text>
  <!-- Small sound waves on right -->
  <path d="M 390 190 Q 410 215 390 240" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 410 175 Q 440 215 410 255" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>