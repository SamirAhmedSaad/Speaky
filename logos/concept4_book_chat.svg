<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bg4)"/>
  <!-- Open book - left page -->
  <path d="M 256 380 L 256 180 Q 200 160 100 180 L 100 370 Q 200 350 256 380 Z" fill="white" opacity="0.95"/>
  <!-- Open book - right page -->
  <path d="M 256 380 L 256 180 Q 312 160 412 180 L 412 370 Q 312 350 256 380 Z" fill="white" opacity="0.85"/>
  <!-- Book spine line -->
  <line x1="256" y1="180" x2="256" y2="380" stroke="#3B82F6" stroke-width="3" opacity="0.3"/>
  <!-- Text lines on left page -->
  <line x1="140" y1="220" x2="230" y2="220" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="140" y1="250" x2="220" y2="250" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="140" y1="280" x2="225" y2="280" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Chat bubble coming from book -->
  <ellipse cx="370" cy="110" rx="80" ry="55" fill="#FBBF24"/>
  <polygon points="340,155 360,145 330,180" fill="#FBBF24"/>
  <!-- Chat dots -->
  <circle cx="345" cy="110" r="8" fill="white"/>
  <circle cx="370" cy="110" r="8" fill="white"/>
  <circle cx="395" cy="110" r="8" fill="white"/>
</svg>