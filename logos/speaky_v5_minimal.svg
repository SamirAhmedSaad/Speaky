<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Deep purple background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#g5)"/>
  <!-- Speaky stacked: "Speak" on top, "y" as accent -->
  <text x="256" y="225" font-family="Arial Black, sans-serif" font-weight="900" font-size="110" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="6">Spk</text>
  <!-- Stylized speech marks -->
  <text x="256" y="340" font-family="Georgia, serif" font-style="italic" font-size="48" fill="#FFD93D" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">speaky</text>
  <!-- Underline accent -->
  <line x1="130" y1="370" x2="382" y2="370" stroke="#FFD93D" stroke-width="4" stroke-linecap="round"/>
</svg>